<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | YES Club</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

:root{
    --glass: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.15);
    --primary: #4f8cff;
    --accent: #6a5cff;
}

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    color:white;
    display:flex;
    flex-direction:column;
}

/* BACKGROUND */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background: linear-gradient(-45deg,#0b1220,#1a2a6c,#b21f1f,#0b1220);
    background-size:400% 400%;
    animation: gradientBG 10s ease infinite;
    z-index:-2;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* FLOATING GLOW */
body::after{
    content:"";
    position:fixed;
    width:300px;
    height:300px;
    background: radial-gradient(circle,rgba(79,140,255,0.4),transparent 70%);
    top:10%;
    left:10%;
    filter: blur(40px);
    z-index:-1;
}

/* ================= NAV ================= */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:1rem 2rem;
    position:fixed;
    width:100%;
    top:0;
    z-index:1000;

    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.05);
    border-bottom:1px solid var(--border);
    transition:0.3s ease;
}

nav.shrink{
    padding:0.6rem 2rem;
    background: rgba(10,10,20,0.7);
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* LOGO */
.logo-container {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo-container img {
    width: 38px;
    height: 38px;
    border-radius: 8px;
}

/* NAV LINKS */
.nav-links{
    display:flex;
    gap:20px;
}

.nav-links a{
    text-decoration:none;
    color:white;
    opacity:0.8;
    transition:0.3s;
}

.nav-links a:hover{
    opacity:1;
}

/* HAMBURGER */
.hamburger{
    display:none;
    font-size:26px;
    cursor:pointer;
}

/* MOBILE MENU */
@media(max-width:768px){

    .hamburger{
        display:block;
    }

    .nav-links{
        position:absolute;
        top:65px;
        right:0;
        width:200px;
        flex-direction:column;
        background: rgba(0,0,0,0.85);
        backdrop-filter: blur(15px);
        padding:15px;
        border-left:1px solid var(--border);
        border-bottom:1px solid var(--border);
        display:none;
    }

    .nav-links.active{
        display:flex;
    }
}

/* CENTER WRAPPER */
.wrapper{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    margin-top:70px;
}

/* CARD */
.card{
    width:420px;
    background: var(--glass);
    backdrop-filter: blur(20px);
    border:1px solid var(--border);
    border-radius:20px;
    padding:30px;
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
    text-align:center;
}

.card h2{font-size:24px;margin-bottom:5px;}
.card p{font-size:12px;opacity:0.7;margin-bottom:20px;}

form{
    display:flex;
    flex-direction:column;
    gap:12px;
}

input,textarea{
    padding:12px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.1);
    color:white;
    outline:none;
}

textarea{resize:none;height:90px;}

input::placeholder,textarea::placeholder{
    color:rgba(255,255,255,0.5);
}

button{
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,var(--primary),var(--accent));
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{transform:scale(1.05);}

.status{
    margin-top:10px;
    font-size:13px;
    display:none;
}

.success{color:#4caf50;}
.error{color:#ff4c4c;}

/* FOOTER */
footer{
    text-align:center;
    font-size:12px;
    opacity:0.6;
    padding:10px;
}

</style>
</head>

<body>

<!-- NAV -->
<nav id="navbar">

    <div class="logo-container">
        <img src="Assets/Images/logo.png">
        <div>YES Club</div>
    </div>

    <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="index.html#about">About</a>
        <a href="index.html#news">News</a>
        <a href="contact-us.html">Contact</a>
    </div>

    <!-- HAMBURGER -->
    <div class="hamburger" onclick="toggleMenu()">☰</div>

</nav>

<!-- FORM -->
<div class="wrapper">

    <div class="card">
        <h2>Contact Us</h2>
        <p>We’d love to hear from you</p>

        <form id="contactForm">

            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <textarea name="message" placeholder="Your Message..." required></textarea>

            <input type="hidden" name="time" id="time">

            <button type="submit">Send Message</button>
        </form>

        <div id="statusMsg" class="status"></div>
    </div>

</div>

<footer>© 2026 YES Club</footer>

<script>

/* EMAILJS */
(function(){
    emailjs.init("r8V93aOMcYW4TLen7");
})();

/* TIME */
document.getElementById("time").value = new Date().toLocaleString();

/* SEND */
document.getElementById("contactForm").addEventListener("submit", function(e){
    e.preventDefault();

    const status = document.getElementById("statusMsg");
    status.style.display = "block";
    status.innerHTML = "Sending...";

    emailjs.sendForm(
        "service_l1irorg",
        "template_50jlg0k",
        this
    )
    .then(() => {
        status.className = "status success";
        status.innerHTML = "Message sent successfully!";
        this.reset();
        document.getElementById("time").value = new Date().toLocaleString();
    })
    .catch((err) => {
        console.log(err);
        status.className = "status error";
        status.innerHTML = "Failed to send message.";
    });
});

/* MOBILE MENU TOGGLE */
function toggleMenu(){
    document.getElementById("navLinks").classList.toggle("active");
}

/* NAV SHRINK */
window.addEventListener("scroll", function(){
    const nav = document.getElementById("navbar");
    if(window.scrollY > 20){
        nav.classList.add("shrink");
    } else {
        nav.classList.remove("shrink");
    }
});

</script>

</body>
</html>
